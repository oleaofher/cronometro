<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2DD4BF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo externo -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad)" stroke-width="4"/>
  
  <!-- Marcadores de hora (12, 3, 6, 9) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#F97316" stroke-width="2.5"/>
  <line x1="90" y1="50" x2="82" y2="50" stroke="#F97316" stroke-width="2.5"/>
  <line x1="50" y1="90" x2="50" y2="82" stroke="#F97316" stroke-width="2.5"/>
  <line x1="10" y1="50" x2="18" y2="50" stroke="#F97316" stroke-width="2.5"/>
  
  <!-- Ponteiro dos minutos -->
  <line x1="50" y1="50" x2="50" y2="22" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Ponteiro dos segundos -->
  <line x1="50" y1="50" x2="72" y2="50" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Centro -->
  <circle cx="50" cy="50" r="4" fill="#F97316"/>
</svg>
